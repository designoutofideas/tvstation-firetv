name: Build RFA TVStation APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build unsigned release APK
        run: gradle assembleRelease

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/signing.jks

      - name: Verify keystore
        env:
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          keytool -list -keystore /tmp/signing.jks -storepass "$STORE_PASS"

      - name: Zipalign APK
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/34.0.0/zipalign -v -p 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            /tmp/app-aligned.apk

      - name: Sign APK
        env:
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/34.0.0/apksigner sign \
            --ks /tmp/signing.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out /tmp/app-signed.apk \
            /tmp/app-aligned.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: RFA-TVStation-release
          path: /tmp/app-signed.apk
          retention-days: 30
