name: Build RFA TVStation APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build unsigned release APK
        run: gradle assembleRelease

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/signing.jks
          ls -la /tmp/signing.jks

      - name: Verify keystore password
        run: |
          keytool -list \
            -keystore /tmp/signing.jks \
            -storepass '${{ secrets.KEYSTORE_PASSWORD }}' \
            -alias '${{ secrets.KEY_ALIAS }}'

      - name: Zipalign APK
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/34.0.0/zipalign -v -p 4 \
            tvstation-firetv/app/build/outputs/apk/release/app-release-unsigned.apk \
            /tmp/app-release-aligned.apk

      - name: Sign APK
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/34.0.0/apksigner sign \
            --ks /tmp/signing.jks \
            --ks-key-alias '${{ secrets.KEY_ALIAS }}' \
            --ks-pass 'pass:${{ secrets.KEYSTORE_PASSWORD }}' \
            --key-pass 'pass:${{ secrets.KEY_PASSWORD }}' \
            --out /tmp/app-release-signed.apk \
            /tmp/app-release-aligned.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: RFA-TVStation-release
          path: /tmp/app-release-signed.apk
          retention-days: 30
